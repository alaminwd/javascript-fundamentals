<body>
    <button type="submit" onclick="alertObjct()">Alert</button>
    <button type="submit" onclick="confirmObject()">Confirm</button>
    <button type="submit" onclick="setTimeout()">setTime out</button>
</body>

<script>

    function alertObjct (){
        // document.write("alert success")
        alert("alert success");
    }
    function confirmObject (){
        // document.write("alert success")
        let result = confirm("Are you sure?");
        document.write(result)
    }

     setTimeout(() => {
        alert('time set')
    }, 1000);

</script>
