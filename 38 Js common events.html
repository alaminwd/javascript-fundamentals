<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="Click('onclick success')">onclick event</button>
    <button onmouseover="mouseOver('mouse over')">mouseover</button>
    <button onmouseout="mouseOut('mouse Out')">mouse out</button>

    <input type="text" onchange="Onchange(this.value)">

</body>

    function Onchange(event) {
    console.log("change"+" "+event);

    function Onkeydown(event) {
        console.log("onkeydown"+" "+event);
    }


    function Click(event){
        console.log(event);
        
    }
    function mouseOver(event){
        console.log(event);
        
    }
    function mouseOut(event){
        console.log(event);
    }
