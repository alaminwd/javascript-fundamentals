<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo List</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6fb;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:'Segoe UI', sans-serif;
}

/* Card container */
.todo-box{
    background:#ffffff;
    padding:35px;
    width:420px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* Heading */
.todo-title{
    font-weight:600;
    margin-bottom:25px;
    text-align:center;
    color:#2c3e50;
}

/* Input */
#item{
    width:100%;
    padding:10px 12px;
    border:1px solid #ddd;
    border-radius:6px;
    margin-bottom:12px;
    outline:none;
}

/* Button */
button{
    width:100%;
    border:none;
    padding:10px;
    border-radius:6px;
    background:#4f46e5;
    color:white;
    font-weight:500;
    transition:0.3s;
}

button:hover{
    background:#4338ca;
}

/* List style */
#ul{
    list-style:none;
    padding:0;
    margin-bottom:15px;
}

#ul li{
    background:#f8f9fd;
    padding:10px 12px;
    border-radius:6px;
    margin-bottom:8px;
    border:1px solid #eee;
}

</style>

</head>
<body>

<div class="todo-box">

<h4 class="todo-title">My Todo List</h4>

<ul id="ul"></ul>

<input type="text" id="item" placeholder="Enter your item">

<button onclick="addItem()">Add Item</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>


function addItem(){

let ul = document.getElementById('ul');
let item = document.getElementById('item');
let li = document.createElement('li');
li.innerHTML = item.value;
ul.append(li);
item.value = ""; 
}

</script>

</body>
</html>
